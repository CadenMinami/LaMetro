name: PR checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install Lambda + test deps
        run: |
          pip install -r lambdas/ingestion/requirements.txt
          pip install pytest
      - name: Run pytest
        run: pytest lambdas/

  cdk:
    name: CDK synth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: cdk/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build Lambda asset
        run: |
          chmod +x scripts/build-lambda.sh
          scripts/build-lambda.sh ingestion
      - name: Install CDK deps
        working-directory: cdk
        run: npm ci
      - name: Type-check
        working-directory: cdk
        run: npx tsc --noEmit
      - name: cdk synth
        working-directory: cdk
        run: npx cdk synth --quiet
