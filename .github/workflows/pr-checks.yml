name: PR checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install Lambda + test deps
        run: |
          # Install each lambda's third-party deps. Their requirements.txt
          # files exist for the build script; we leverage them here too.
          for f in lambdas/*/requirements.txt; do
            pip install -r "$f"
          done
          # boto3 ships in the Lambda runtime so it isn't in any
          # requirements.txt, but tests + enrichment/query_api handlers
          # import it, so install it explicitly for CI.
          pip install pytest boto3
      - name: Run pytest
        run: pytest

  cdk:
    name: CDK synth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: cdk/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build Lambda assets
        run: |
          chmod +x scripts/build-lambda.sh
          # train_model is intentionally absent: it's a container-image Lambda
          # (Dockerfile), built by `cdk synth` below, not a zip asset.
          for d in ingestion enrichment query_api aggregation websocket user_api post_confirmation feature_snapshot data_sufficiency_check evaluate_model promote_model precompute_predictions update_endpoint; do
            scripts/build-lambda.sh "$d"
          done
      - name: Build frontend static export
        # FrontendStack uses frontend/out as a CDK asset. /out is gitignored,
        # so CI must produce it before `cdk synth`.
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Install CDK deps
        working-directory: cdk
        run: npm ci
      - name: Type-check
        working-directory: cdk
        run: npx tsc --noEmit
      - name: cdk synth
        working-directory: cdk
        run: npx cdk synth --quiet
